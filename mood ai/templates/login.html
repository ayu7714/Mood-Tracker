<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  {% include 'header.html' %}
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      <form method="post" class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <div id="loginError" class="form-error" style="display:none"></div>
        <button type="submit" class="auth-btn">Sign In</button>
      </form>

      <script>
        (function(){
          const form = document.getElementById('loginForm');
          const errEl = document.getElementById('loginError');
          function showError(msg){ errEl.textContent = msg; errEl.style.display = 'block'; }
          function hideError(){ errEl.style.display = 'none'; errEl.textContent = ''; }
          function validEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

          form.addEventListener('submit', function(e){
            hideError();
            const email = form.email.value.trim();
            const username = form.username.value.trim();
            const pwd = form.password.value || '';

            if(!username){ e.preventDefault(); showError('Please enter your username.'); form.username.focus(); return; }
            if(email && !validEmail(email)){ e.preventDefault(); showError('Please enter a valid email address or leave the email field empty.'); form.email.focus(); return; }
            if(!pwd){ e.preventDefault(); showError('Please enter your password.'); form.password.focus(); return; }
          });
        })();
      </script>
      <div class="auth-footer">
        <p>Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
        <p><a href="{{ url_for('index') }}">Back to Home</a></p>
      </div>
    </div>
  </div>
</body>
</html>
