<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Mood Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-shell">
    {% include 'header.html' %}

    <div class="app-body">
      <aside class="side-nav">
        <div class="side-logo">🎯 MoodAI</div>
        <nav>
          <a href="#" class="side-link" onclick="newChat(); return false;"><span class="side-icon">💬</span> New Chat</a>
          <a href="{{ url_for('history') }}" class="side-link"><span class="side-icon">📋</span> History</a>
          <button type="button" class="side-link settings-btn" onclick="openSettings(); return false;"><span class="side-icon">⚙️</span> Settings</button>
        </nav>
      </aside>

      <main class="chat-area">
        <div class="chat-window">
          <div class="chat-header">
            <h2>AI Mood Support</h2>
            <p class="sub">Type how you feel and get supportive suggestions</p>
          </div>

          <div id="responseBox" class="messages"></div>

          <div class="chat-input">
            <div class="input-pill">
              <textarea id="moodInput" rows="1" placeholder="How are you feeling right now?" oninput="autoResize(this)"></textarea>
              <button id="sendBtn" type="button" class="send-btn" aria-label="Send" title="Send (Enter)" onclick="submitMood()">
                

                <!-- paper-plane icon -->
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                  <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
              </button>
              <button type="button" id="cameraMoodBtn" title="Loading AI models..." disabled>⏳ Loading AI...</button>

            </div>
          </div>
        </div>
      </main>
  </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" onclick="closeSettings()">&times;</button>
      </div>
      <div class="modal-body">
        <!-- User Profile Section (only visible when signed in) -->
        {% if user %}
        <div class="settings-section">
          <h3>👤 Profile</h3>
          <p id="currentUsername" style="font-weight:700;color:#0b4bd6;margin-bottom:12px"></p>
          <label for="profileSelect">Switch Profile:</label>
          <select id="profileSelect" onchange="switchProfile(this.value)" style="width:100%;padding:8px;border-radius:8px;border:1px solid #ddd;margin-top:8px;font-size:14px">
            <option value="">Select a profile...</option>
          </select>
        </div>
        {% endif %}

        <!-- Dark Mode Section -->
        <div class="settings-section">
          <h3>🌙 Dark Mode</h3>
          <div class="toggle-switch">
            <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
            <label for="darkModeToggle" class="toggle-label"></label>
            <span id="darkModeStatus">Off</span>
          </div>
        </div>

        <!-- Background Section -->
        {% if user %}
        <div class="settings-section">
          <h3>🎨 Background</h3>
          <div style="margin-bottom:12px;">
            <label for="backgroundType">Type:</label>
            <select id="backgroundType" onchange="changeBackgroundType()" style="width:100%;padding:8px;border-radius:8px;border:1px solid #ddd;margin-top:8px;font-size:14px">
              <option value="default">Default</option>
              <option value="color">Solid Color</option>
              <option value="image">Image</option>
            </select>
          </div>
          <div id="colorPicker" style="display:none;margin-bottom:12px;">
            <label for="backgroundColor">Color:</label>
            <input type="color" id="backgroundColor" onchange="changeBackgroundColor()" style="width:100%;padding:8px;border-radius:8px;border:1px solid #ddd;margin-top:8px;">
          </div>
          <div id="imageUploader" style="display:none;margin-bottom:12px;">
            <label for="backgroundImage" class="upload-label">Choose Image</label>
            <input type="file" id="backgroundImage" accept="image/*" onchange="uploadBackgroundImage()" style="display:none;">
          </div>
        </div>
        {% endif %}

        <!-- Logout Section -->
        <div class="settings-section">
          <h3>🚪 Account</h3>
          {% if user %}
          <form method="post" action="{{ url_for('logout') }}" style="display:inline">
            <button type="submit" class="btn-logout">Logout</button>
          </form>
          {% else %}
          <div style="display:flex;gap:8px;align-items:center">
            <a href="{{ url_for('login') }}" class="btn-logout" style="display:inline-flex;align-items:center;gap:8px;padding:10px 14px;">
              <!-- login icon -->
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M10 17l5-5-5-5v10z" fill="currentColor"/><path d="M19 19H5v-2h14v2z" fill="currentColor"/></svg>
              <span>Login</span>
            </a>
            <a href="{{ url_for('register') }}" class="btn-ghost" style="display:inline-flex;align-items:center;gap:8px;padding:10px 14px;">
              <!-- register icon -->
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5z" fill="currentColor"/><path d="M4 20c0-2.67 5.33-4 8-4s8 1.33 8 4v1H4v-1z" fill="currentColor"/></svg>
              <span>Register</span>
            </a>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </div>

  </div>


  <script>
    // Helpers
    function escapeHtml(unsafe) {
      return unsafe
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatTimestamp(d) {
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${hh}:${mm}`;
    }

    function relativeTime(d) {
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 5) return 'just now';
      if (diff < 60) return `${diff}s`;
      const minutes = Math.floor(diff / 60);
      if (minutes < 60) return `${minutes}m`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}d`;
      return d.toLocaleDateString();
    }

    // Robust fetch with timeout and retry for transient failures
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function robustPost(url, body, { retries = 3, timeout = 8000 } = {}) {
      let attempt = 0;
      const fullUrl = new URL(url, window.location.origin).toString();
      while (attempt < retries) {
        attempt++;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
          const resp = await fetch(fullUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            signal: controller.signal
          });
          clearTimeout(id);

          // if server error, allow retry
          if (resp.status >= 500 && attempt < retries) {
            await sleep(300 * attempt);
            continue;
          }

          // return response for parsing by caller
          return resp;
        } catch (err) {
          clearTimeout(id);
          // aborted or network error, retry if attempts remain
          if (attempt < retries) {
            await sleep(300 * attempt);
            continue;
          }
          throw err;
        }
      }
      throw new Error('Failed after retries');
    }

    async function submitMood() {
      const inputEl = document.getElementById("moodInput");
      const moodText = inputEl.value.trim();
      if (!moodText) return;

      const messages = document.getElementById('responseBox');

  // Append user message
  const userNode = document.createElement('div');
  userNode.className = 'message user';
  const now = new Date();
  userNode.innerHTML = `<div class="text">${escapeHtml(moodText)}</div><div class="meta" title="${now.toLocaleString()}">${relativeTime(now)}</div>`;
      messages.appendChild(userNode);
      messages.scrollTop = messages.scrollHeight;

      // Clear input promptly
      inputEl.value = '';

  // Show typing indicator
      const typingNode = document.createElement('div');
      typingNode.className = 'message bot typing';
      typingNode.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
      messages.appendChild(typingNode);
      messages.scrollTop = messages.scrollHeight;

  // disable send button while request is in-flight (add sending class)
  const sendBtnEl = document.getElementById('sendBtn');
  if (sendBtnEl) { sendBtnEl.disabled = true; sendBtnEl.classList.add('sending'); sendBtnEl.setAttribute('aria-busy','true'); }

      try {
        const resp = await robustPost('/api/mood', { mood: moodText }, { retries: 3, timeout: 8000 });

        // Try parse as JSON, but handle non-JSON gracefully
        let data = null;
        try { data = await resp.json(); } catch (parseErr) {
          const text = await resp.text().catch(() => 'Server returned an unexpected response.');
          throw new Error(text || 'Invalid JSON from server');
        }

        // remove typing indicator
        typingNode.remove();

        const botNode = document.createElement('div');
        botNode.className = 'message bot';

        if (resp.ok && data && data.status === 'success') {
          let bodyHtml = `<div class="text"><strong>Mood:</strong> ${escapeHtml(data.emotion)} (${escapeHtml(String(data.intensity))})<br><em>"${escapeHtml(data.quote)}"</em><br><strong>Action:</strong> ${escapeHtml(data.action)}</div>`;

          // add interactive game buttons if present
          if (data.game === 'breathing') {
            bodyHtml += `<div class="breathing-embed"><button class="glow-btn" onclick="openBreathing()">Start Breathing Exercise</button></div>`;
          } else if (data.game === 'ludo') {
            bodyHtml += `<div class="ludo-embed"><button class="glow-btn" onclick="openLudo()">Play Ludo</button></div>`;
          } else if (data.game === 'mario') {
            bodyHtml += `<div class="mario-embed"><button class="glow-btn" onclick="openMario()">Play Game</button></div>`;
          } else if (data.game === 'todo') {
            bodyHtml += `<div class="todo-embed"><button class="glow-btn" onclick="openTodo()">Open Todo</button></div>`;
          } else if (data.game === 'diary') {
            bodyHtml += `<div class="diary-embed"><button class="glow-btn" onclick="openDiary()">Open Diary</button></div>`;
          }

          const nowBot = new Date();
          botNode.innerHTML = bodyHtml + `<div class="meta" title="${nowBot.toLocaleString()}">${relativeTime(nowBot)}</div>`;
          messages.appendChild(botNode);
          messages.scrollTop = messages.scrollHeight;

          if (data.game === 'breathing') setupBreathingGame();
        } else {
          const errText = (data && (data.quote || data.action || data.message)) || `Server error (${resp.status}). Please try again.`;
          const encoded = encodeURIComponent(moodText);
          const nowErr = new Date();
          botNode.innerHTML = `<div class="text">${escapeHtml(errText)}</div><div class="actions"><button class="glow-btn retry-btn" onclick="retryMessage(this)" data-mood="${encoded}">Retry</button></div><div class="meta" title="${nowErr.toLocaleString()}">${relativeTime(nowErr)}</div>`;
          messages.appendChild(botNode);
          messages.scrollTop = messages.scrollHeight;
        }

      } catch (err) {
        // remove typing indicator if present
        try { typingNode.remove(); } catch (e) {}
  const botNode = document.createElement('div');
  botNode.className = 'message bot';
  const msg = (err && err.message) ? err.message : 'Network error. Please try again.';
  const encoded = encodeURIComponent(moodText);
  const nowErr = new Date();
  botNode.innerHTML = `<div class="text">${escapeHtml(msg)}<br><small>If this persists, check your network or try again later.</small></div><div class="actions"><button class="glow-btn retry-btn" onclick="retryMessage(this)" data-mood="${encoded}">Retry</button></div><div class="meta" title="${nowErr.toLocaleString()}">${relativeTime(nowErr)}</div>`;
        messages.appendChild(botNode);
        messages.scrollTop = messages.scrollHeight;
        console.error('submitMood error:', err);
      } finally {
        if (sendBtnEl) { sendBtnEl.disabled = false; sendBtnEl.classList.remove('sending'); sendBtnEl.removeAttribute('aria-busy'); }
      }
    }

    // Robust GET with timeout and retry
    async function robustGet(url, { retries = 2, timeout = 6000 } = {}) {
      let attempt = 0;
      const fullUrl = new URL(url, window.location.origin).toString();
      while (attempt < retries) {
        attempt++;
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
          const resp = await fetch(fullUrl, { method: 'GET', signal: controller.signal });
          clearTimeout(id);
          if (resp.status >= 500 && attempt < retries) {
            await sleep(200 * attempt);
            continue;
          }
          return resp;
        } catch (err) {
          clearTimeout(id);
          if (attempt < retries) {
            await sleep(200 * attempt);
            continue;
          }
          throw err;
        }
      }
      throw new Error('Failed after retries');
    }

    async function loadHistory() {
      try {
        const resp = await robustGet('/api/history', { retries: 2, timeout: 5000 });
        if (!resp || resp.status !== 200) return;
        const items = await resp.json();
        if (!Array.isArray(items) || items.length === 0) return;

        const messages = document.getElementById('responseBox');
        // Render oldest -> newest
        for (const it of items) {
          try {
            const created = it.created_at ? new Date(it.created_at) : new Date();

            const userNode = document.createElement('div');
            userNode.className = 'message user';
            userNode.innerHTML = `<div class="text">${escapeHtml(it.input || '')}</div><div class="meta">${formatTimestamp(created)}</div>`;
            messages.appendChild(userNode);

            const botNode = document.createElement('div');
            botNode.className = 'message bot';
            let bodyHtml = `<div class="text"><strong>Mood:</strong> ${escapeHtml(it.emotion || '')} (${escapeHtml(it.intensity || '')})<br><em>"${escapeHtml(it.quote || '')}"</em><br><strong>Action:</strong> ${escapeHtml(it.action || '')}</div>`;
            if (it.game === 'breathing') {
              bodyHtml += `<div class="breathing-embed"><button class="glow-btn" onclick="openBreathing()">Start Breathing Exercise</button></div>`;
            } else if (it.game === 'ludo') {
              bodyHtml += `<div class="ludo-embed"><button class="glow-btn" onclick="openLudo()">Play Ludo</button></div>`;
            } else if (it.game === 'mario') {
              bodyHtml += `<div class="mario-embed"><button class="glow-btn" onclick="openMario()">Play Game</button></div>`;
            } else if (it.game === 'todo') {
              bodyHtml += `<div class="todo-embed"><button class="glow-btn" onclick="openTodo()">Open Todo</button></div>`;
            } else if (it.game === 'diary') {
              bodyHtml += `<div class="diary-embed"><button class="glow-btn" onclick="openDiary()">Open Diary</button></div>`;
            }

            botNode.innerHTML = bodyHtml + `<div class="meta">${formatTimestamp(created)}</div>`;
            messages.appendChild(botNode);
          } catch (e) {
            console.warn('Failed to render history item', e);
          }
        }
        messages.scrollTop = messages.scrollHeight;
      } catch (err) {
        console.warn('Could not load history', err);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      // only attempt to load history for signed-in users
      {% if user %}
      loadInitialHistory();
      {% endif %}
      // wire up send button and keyboard shortcuts
      const sendBtn = document.getElementById('sendBtn');
      const input = document.getElementById('moodInput');
      if (sendBtn && input) {
        sendBtn.addEventListener('click', submitMood);

        // Enter to send, Shift+Enter to newline; Ctrl+Enter also sends
        input.addEventListener('keydown', function(e) {
          if ((e.key === 'Enter' && !e.shiftKey) || (e.key === 'Enter' && e.ctrlKey)) {
            e.preventDefault();
            submitMood();
          }
        });
      }
    });

    function retryMessage(btn) {
      try {
        const encoded = btn.getAttribute('data-mood') || '';
        const mood = decodeURIComponent(encoded);
        const input = document.getElementById('moodInput');
        input.value = mood;
        input.focus();
        submitMood();
      } catch (e) {
        console.error('retryMessage error', e);
        alert('Unable to retry. Please retype your message.');
      }
    }

    // auto-resize textarea
    function autoResize(el) {
      try {
        el.style.height = 'auto';
        el.style.height = (el.scrollHeight) + 'px';
      } catch (e) {
        // ignore
      }
    }

    // --- Breathing Game Logic ---
    function setupBreathingGame() {
      let breathingActive = false;
      let breathingInterval;
      let phase = 0;

      const instruction = document.getElementById("breathInstruction");
      const circle = document.getElementById("breathCircle");
      const startBtn = document.getElementById("startBreathing");
      const stopBtn = document.getElementById("stopBreathing");

      const phases = [
        { text: "Breathe In", scale: 1.5, duration: 4000 },
        { text: "Hold", scale: 1.5, duration: 3000 },
        { text: "Breathe Out", scale: 1, duration: 4000 },
        { text: "Hold", scale: 1, duration: 3000 }
      ];

      function runPhase() {
        if (!breathingActive) return;
        const { text, scale, duration } = phases[phase];
        instruction.textContent = text;
        circle.style.transition = `transform ${duration / 1000}s ease-in-out`;
        circle.style.transform = `scale(${scale})`;

        phase = (phase + 1) % phases.length;
        breathingInterval = setTimeout(runPhase, duration);
      }

      startBtn.onclick = () => {
        if (breathingActive) return;
        breathingActive = true;
        startBtn.style.display = "none";
        stopBtn.style.display = "inline-block";
        runPhase();
      };

      stopBtn.onclick = () => {
        breathingActive = false;
        clearTimeout(breathingInterval);
        instruction.textContent = "Take a deep breath 🌿";
        circle.style.transition = "transform 1s ease-in-out";
        circle.style.transform = "scale(1)";
        startBtn.style.display = "inline-block";
        stopBtn.style.display = "none";
      };
    }

    // --- Open Games ---
    // Pagination state
    let historyBefore = null; // cursor (ISO) to fetch older entries
    let historyHasMore = false;
    let historyLoading = false;

    async function loadInitialHistory(limit=20) {
      // load newest page
      try {
        const resp = await robustGet('/api/history?limit=' + encodeURIComponent(limit), { retries: 2, timeout: 5000 });
        if (!resp || resp.status !== 200) return;
        const payload = await resp.json();
        if (!payload || !Array.isArray(payload.items) || payload.items.length === 0) return;
        // server returns newest-first; we render oldest->newest
        const items = payload.items;
        historyHasMore = !!payload.has_more;
        historyBefore = payload.next_before;

        const messages = document.getElementById('responseBox');
        for (let i = items.length - 1; i >= 0; i--) {
          const it = items[i];
          try {
            const created = it.created_at ? new Date(it.created_at) : new Date();

            const userNode = document.createElement('div');
            userNode.className = 'message user';
            userNode.innerHTML = `<div class="text">${escapeHtml(it.input || '')}</div><div class="meta" title="${created.toLocaleString()}">${relativeTime(created)}</div>`;
            messages.appendChild(userNode);

            const botNode = document.createElement('div');
            botNode.className = 'message bot';
            botNode.dataset.game = it.game || '';
            let bodyHtml = `<div class="text"><strong>Mood:</strong> ${escapeHtml(it.emotion || '')} (${escapeHtml(it.intensity || '')})<br><em>"${escapeHtml(it.quote || '')}"</em><br><strong>Action:</strong> ${escapeHtml(it.action || '')}</div>`;
            if (it.game === 'breathing') {
              bodyHtml += `<div class="breathing-embed"><button class="glow-btn" onclick="openBreathing()">Start Breathing Exercise</button></div>`;
            } else if (it.game === 'ludo') {
              bodyHtml += `<div class="ludo-embed"><button class="glow-btn" onclick="openLudo()">Play Ludo</button></div>`;
            } else if (it.game === 'mario') {
              bodyHtml += `<div class="mario-embed"><button class="glow-btn" onclick="openMario()">Play Game</button></div>`;
            } else if (it.game === 'todo') {
              bodyHtml += `<div class="todo-embed"><button class="glow-btn" onclick="openTodo()">Open Todo</button></div>`;
            } else if (it.game === 'diary') {
              bodyHtml += `<div class="diary-embed"><button class="glow-btn" onclick="openDiary()">Open Diary</button></div>`;
            }

            botNode.innerHTML = bodyHtml + `<div class="meta" title="${created.toLocaleString()}">${relativeTime(created)}</div>`;
            if (it.game) botNode.classList.add('clickable');
            messages.appendChild(botNode);

            // enable clicking to open game or bind breathing button
            if (it.game === 'breathing') {
              // ensure the breathing button opens the popup
              const breathBtn = botNode.querySelector('.glow-btn');
              if (breathBtn) {
                breathBtn.addEventListener('click', function(ev) { ev.stopPropagation(); window.openBreathing(); });
              }
            } else if (it.game === 'ludo') {
              botNode.addEventListener('click', function() { openLudo(); });
            } else if (it.game === 'mario') {
              botNode.addEventListener('click', function() { openMario(); });
            } else if (it.game === 'todo') {
              botNode.addEventListener('click', function() { openTodo(); });
            } else if (it.game === 'diary') {
              botNode.addEventListener('click', function() { openDiary(); });
            }

          } catch (e) {
            console.warn('Failed to render history item', e);
          }
        }
        messages.scrollTop = messages.scrollHeight;
      } catch (err) {
        console.warn('Could not load history', err);
      }
    }

    async function loadOlderHistory() {
      if (!historyHasMore || historyLoading) return;
      historyLoading = true;
      try {
        const messages = document.getElementById('responseBox');
        const oldHeight = messages.scrollHeight;
        const resp = await robustGet('/api/history?limit=20&before=' + encodeURIComponent(historyBefore), { retries: 2, timeout: 5000 });
        if (!resp || resp.status !== 200) return;
        const payload = await resp.json();
        const items = payload.items || [];
        historyHasMore = !!payload.has_more;
        historyBefore = payload.next_before;

        // items is newest-first; we need to prepend oldest->newest order
        for (let i = items.length - 1; i >= 0; i--) {
          const it = items[i];
          try {
            const created = it.created_at ? new Date(it.created_at) : new Date();
            const userNode = document.createElement('div');
            userNode.className = 'message user';
            userNode.innerHTML = `<div class="text">${escapeHtml(it.input || '')}</div><div class="meta" title="${created.toLocaleString()}">${relativeTime(created)}</div>`;

            const botNode = document.createElement('div');
            botNode.className = 'message bot';
            botNode.dataset.game = it.game || '';
            let bodyHtml = `<div class="text"><strong>Mood:</strong> ${escapeHtml(it.emotion || '')} (${escapeHtml(it.intensity || '')})<br><em>"${escapeHtml(it.quote || '')}"</em><br><strong>Action:</strong> ${escapeHtml(it.action || '')}</div>`;
            if (it.game === 'breathing') {
              bodyHtml += `<div class="breathing-embed"><button class="glow-btn" onclick="openBreathing()">Start Breathing Exercise</button></div>`;
            } else if (it.game === 'ludo') {
              bodyHtml += `<div class="ludo-embed"><button class="glow-btn" onclick="openLudo()">Play Ludo</button></div>`;
            } else if (it.game === 'mario') {
              bodyHtml += `<div class="mario-embed"><button class="glow-btn" onclick="openMario()">Play Game</button></div>`;
            } else if (it.game === 'todo') {
              bodyHtml += `<div class="todo-embed"><button class="glow-btn" onclick="openTodo()">Open Todo</button></div>`;
            } else if (it.game === 'diary') {
              bodyHtml += `<div class="diary-embed"><button class="glow-btn" onclick="openDiary()">Open Diary</button></div>`;
            }

            botNode.innerHTML = bodyHtml + `<div class="meta" title="${created.toLocaleString()}">${relativeTime(created)}</div>`;
            if (it.game) botNode.classList.add('clickable');

            // prepend
            messages.insertBefore(botNode, messages.firstChild);
            messages.insertBefore(userNode, botNode);
          } catch (e) {
            console.warn('Failed to render history item', e);
          }
        }

        // restore scroll position so view doesn't jump
        const newHeight = messages.scrollHeight;
        messages.scrollTop = newHeight - oldHeight;
      } catch (err) {
        console.warn('Could not load older history', err);
      } finally {
        historyLoading = false;
      }
    }

    function injectScopedBreathing(root) {
      // avoid injecting twice
      if (root.querySelector('.scoped-breath')) return;
      const container = document.createElement('div');
      container.className = 'scoped-breath';
      container.innerHTML = `
        <div class="breathing-game">
          <div class="breath-circle"></div>
          <div class="breath-instruction">Ready? Click Start!</div>
          <div class="breath-controls"><button class="glow-btn start-local">Start</button><button class="glow-btn stop-local" style="display:none">Stop</button></div>
        </div>
      `;
      root.appendChild(container);

      const circle = container.querySelector('.breath-circle');
      const instruction = container.querySelector('.breath-instruction');
      const startBtn = container.querySelector('.start-local');
      const stopBtn = container.querySelector('.stop-local');

      let active = false, phase = 0, timer = null;
      const phases = [
        { text: 'Breathe In', scale: 1.5, duration: 4000 },
        { text: 'Hold', scale: 1.5, duration: 3000 },
        { text: 'Breathe Out', scale: 1, duration: 4000 },
        { text: 'Hold', scale: 1, duration: 3000 }
      ];

      function run() {
        if (!active) return;
        const p = phases[phase];
        instruction.textContent = p.text;
        circle.style.transition = `transform ${p.duration/1000}s ease-in-out`;
        circle.style.transform = `scale(${p.scale})`;
        phase = (phase+1) % phases.length;
        timer = setTimeout(run, p.duration);
      }

      startBtn.addEventListener('click', () => {
        if (active) return;
        active = true; startBtn.style.display='none'; stopBtn.style.display='inline-block'; phase=0; run();
      });
      stopBtn.addEventListener('click', () => {
        active = false; clearTimeout(timer); instruction.textContent='Take a deep breath 🌿'; circle.style.transform='scale(1)'; startBtn.style.display='inline-block'; stopBtn.style.display='none';
      });
    }

        const top = Math.max(0, Math.round((screen.height - h) / 2));
        const opts = `width=${w},height=${h},top=${top},left=${left},resizable=yes,scrollbars=no`;
        const win = window.open(url, name, opts);
        if (!win) window.location.href = url;
      } catch (e) {
        // fallback to same-tab navigation
        window.location.href = url;
      }
    }

      const body = document.body;
      body.classList.remove('custom-bg');
      body.style.backgroundImage = '';

      if (type === 'color') {
        body.classList.add('custom-bg');

                    if (data.game === 'breathing') setupBreathingGame();
                } else {
                    const errText = (data && (data.quote || data.action || data.message)) || `Server error (${resp.status}). Please try again.`;
                    const encoded = encodeURIComponent(moodText);
                    const nowErr = new Date();
                    botNode.innerHTML = `<div class="text">${escapeHtml(errText)}</div><div class="actions"><button class="glow-btn retry-btn" onclick="retryMessage(this)" data-mood="${encoded}">Retry</button></div><div class="meta" title="${nowErr.toLocaleString()}">${relativeTime(nowErr)}</div>`;
                    messages.appendChild(botNode);
                    messages.scrollTop = messages.scrollHeight;
                }

            } catch (err) {
                // remove typing indicator if present
                try { typingNode.remove(); } catch (e) {}
                const botNode = document.createElement('div');
                botNode.className = 'message bot';
                const msg = (err && err.message) ? err.message : 'Network error. Please try again.';
                const encoded = encodeURIComponent(moodText);
                const nowErr = new Date();
                botNode.innerHTML = `<div class="text">${escapeHtml(msg)}<br><small>If this persists, check your network or try again later.</small></div><div class="actions"><button class="glow-btn retry-btn" onclick="retryMessage(this)" data-mood="${encoded}">Retry</button></div><div class="meta" title="${nowErr.toLocaleString()}">${relativeTime(nowErr)}</div>`;
                messages.appendChild(botNode);
                messages.scrollTop = messages.scrollHeight;
                console.error('Camera mood detection error:', err);
            }
        }
    }

    cameraBtn.addEventListener('click', async () => {

        // First check if faceapi is loaded
        if (typeof faceapi === 'undefined' || !faceapi || typeof faceapi.nets === 'undefined') {
          alert('[DEBUG] Face API not loaded! Please refresh the page.');
          console.error('[DEBUG] faceapi object:', faceapi);
          return;
        }
        if (!faceapi.nets.tinyFaceDetector.isLoaded || !faceapi.nets.faceExpressionNet.isLoaded) {
          alert('[DEBUG] Face API models not loaded!');
          console.error('[DEBUG] Model loaded states:', faceapi.nets.tinyFaceDetector.isLoaded, faceapi.nets.faceExpressionNet.isLoaded);
          return;
        }

        cameraBtn.disabled = true;
        cameraBtn.innerHTML = '🔍 Analyzing...';

        const modelsLoaded = cameraBtn.dataset.modelsLoaded === 'true';

        if (!modelsLoaded) {
            alert('AI models are still loading. Please wait for the button to show "📷 Camera (AI Ready)" before clicking.');
            cameraBtn.disabled = false;
            cameraBtn.innerHTML = '⏳ Loading AI...';
            return;
        }

        // Enhanced AI-powered emotion detection
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
          const video = document.getElementById('faceVideo');
          video.srcObject = stream;

          // Enhanced video display with better positioning
          video.style.display = 'block';
          video.style.position = 'fixed';
          video.style.top = '50%';
          video.style.left = '50%';
          video.style.transform = 'translate(-50%, -50%)';
          video.style.zIndex = '9999';
          video.style.border = '3px solid #28a745';
          video.style.borderRadius = '15px';
          video.style.boxShadow = '0 0 20px rgba(40, 167, 69, 0.3)';
          video.style.maxWidth = '400px';

          // Create real-time feedback overlay
          const feedbackDiv = document.createElement('div');
          feedbackDiv.id = 'emotionFeedback';
          feedbackDiv.style.cssText = `
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10000;
            text-align: center;
          `;
          document.body.appendChild(feedbackDiv);

          // Ensure video is ready
          await video.play();

          let bestDetection = null;
          let maxConfidence = 0;

          // Analyze multiple frames for better accuracy
          for (let i = 0; i < 10; i++) {
            feedbackDiv.textContent = `Analyzing... ${i + 1}/10`;
            await new Promise(resolve => setTimeout(resolve, 300));

            try {
              const detection = await faceapi
                .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.5 }))
                .withFaceExpressions();

              if (detection && detection.expressions) {
                const confidence = Math.max(...Object.values(detection.expressions));
                if (confidence > maxConfidence) {
                  maxConfidence = confidence;
                  bestDetection = detection;
                }
              }
            } catch (err) {
              console.log('Detection attempt failed:', err);
            }
          }

          // Clean up
          stream.getTracks().forEach(track => track.stop());
          video.style.display = 'none';
          video.srcObject = null;
          document.body.removeChild(feedbackDiv);

          if (bestDetection && bestDetection.expressions) {
            console.log('Best detection found:', bestDetection);
            console.log('Expressions:', bestDetection.expressions);
            const emotionAnalysis = analyzeEmotions(bestDetection.expressions);

            // Log detailed analysis for debugging
            console.log('Emotion Analysis:', emotionAnalysis);
            console.log('Raw expressions:', bestDetection.expressions);

            // Show detected emotions in alert for testing
            const emotions = Object.entries(bestDetection.expressions)
              .sort(([,a], [,b]) => b - a)
              .slice(0, 3)
              .map(([emotion, score]) => `${emotion}: ${(score * 100).toFixed(1)}%`)
              .join('\n');
            alert(`Detected Emotions:\n${emotions}\n\nAnalysis: ${emotionAnalysis.text}\n\nEmotion: ${emotionAnalysis.emotion}\nQuote: ${emotionAnalysis.quote}`);

            await sendCameraMoodMessage(emotionAnalysis.text, emotionAnalysis);
          } else {
            console.log('No face detection found after 10 attempts');
            alert("No face detected clearly. Please ensure:\n• Good lighting\n• Face centered in frame\n• No obstructions\n• Look directly at camera");
          }

          cameraBtn.disabled = false;
          cameraBtn.innerHTML = '📷 Camera';
        } catch (err) {
          alert("Camera access denied or not available. Please check your camera permissions.");
          cameraBtn.disabled = false;
          cameraBtn.innerHTML = '📷 Camera';
          console.error('Camera access error:', err);
        }
    });

      const query = document.getElementById('musicSearch').value.trim();
      if (!query) {
        alert('Please enter a search term.');
        return;
      }

      const resultsDiv = document.getElementById('musicResults');
      resultsDiv.style.display = 'block';
      resultsDiv.innerHTML = '<h4>Searching...</h4>';

      try {
        // Mock search results - in a real app, this would call Spotify API
        const mockResults = [
          { title: 'Blinding Lights', artist: 'The Weeknd', album: 'After Hours', image: '🎵' },
          { title: 'Watermelon Sugar', artist: 'Harry Styles', album: 'Fine Line', image: '🎸' },
          { title: query + ' Remix', artist: 'Various Artists', album: 'Remixes', image: '🎧' },

    async function detectEmotionForMusic() {
      const btn = event.target;
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="camera-icon">📷</span> Detecting...';

      const resultsDiv = document.getElementById('emotionMusicResults');
      resultsDiv.innerHTML = '<p style="color: #b3b3b3;">Analyzing your mood...</p>';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById('faceVideo');
        video.srcObject = stream;
        video.style.display = 'block';
        video.style.position = 'fixed';
        video.style.top = '50%';
        video.style.left = '50%';
        video.style.transform = 'translate(-50%, -50%)';
        video.style.zIndex = '9999';
        video.style.border = '2px solid #1db954';
        video.style.borderRadius = '10px';

        video.onloadedmetadata = async () => {
          await new Promise(resolve => setTimeout(resolve, 3000));

          const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceExpressions();

          stream.getTracks().forEach(track => track.stop());
          video.style.display = 'none';
          video.srcObject = null;

          if (detection && detection.expressions) {
            const expr = detection.expressions;
            const bestEmotion = Object.keys(expr).reduce((a, b) =>
              expr[a] > expr[b] ? a : b);

            const emotionPlaylists = {
              happy: {
                name: 'Happy Hits',
                description: 'Upbeat songs to keep the good vibes going',
                songs: ['Happy - Pharrell Williams', 'Can\'t Stop the Feeling! - Justin Timberlake', 'Uptown Funk - Mark Ronson ft. Bruno Mars']
              },
              sad: {
                name: 'Sad Songs',
                description: 'Songs for when you need a good cry',
                songs: ['Someone Like You - Adele', 'All I Want - Kodaline', 'Hurt - Johnny Cash']
              },
              angry: {
                name: 'Angry Anthems',
                description: 'Let it out with these high-energy tracks',
                songs: ['Break Stuff - Limp Bizkit', 'Killing in the Name - Rage Against the Machine', 'You Give Love a Bad Name - Bon Jovi']
              },
              fearful: {
                name: 'Calm & Peaceful',
                description: 'Relaxing music to ease your mind',
                songs: ['Weightless - Marconi Union', 'River Flows in You - Yiruma', 'The Night We Met - Lord Huron']
              },
              surprised: {
                name: 'Exciting Discoveries',
                description: 'Fun and surprising tracks',
                songs: ['Shut Up and Dance - Walk the Moon', 'Sugar - Maroon 5', 'Moves Like Jagger - Maroon 5 ft. Christina Aguilera']
              },
              disgusted: {
                name: 'Alternative Vibes',
                description: 'Unique sounds for different tastes',
                songs: ['Take Me to Church - Hozier', 'Radioactive - Imagine Dragons', 'Demons - Imagine Dragons']
              },
              neutral: {
                name: 'Chill Mix',
                description: 'Perfect background music',
                songs: ['Riptide - Vance Joy', 'Ho Hey - The Lumineers', 'Little Talks - Of Monsters and Men']
              }
            };

            const playlist = emotionPlaylists[bestEmotion] || emotionPlaylists.neutral;

            resultsDiv.innerHTML = `
              <div style="background: #181818; padding: 16px; border-radius: 8px; margin-top: 16px;">
                <h4 style="color: white; margin: 0 0 8px 0;">🎭 Detected: ${bestEmotion.charAt(0).toUpperCase() + bestEmotion.slice(1)}</h4>
                <p style="color: #b3b3b3; margin: 0 0 12px 0;">${playlist.description}</p>
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                  <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #1db954, #1ed760); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px;">🎵</div>
                  <div>
                    <h4 style="color: white; margin: 0; font-size: 18px;">${playlist.name}</h4>
                    <p style="color: #b3b3b3; margin: 4px 0 0 0; font-size: 12px;">Mood-based playlist</p>
                  </div>
                </div>
                <div style="max-height: 200px; overflow-y: auto;">
                  ${playlist.songs.map(song => `
                    <div class="song-result" onclick="playSong('${song.split(' - ')[0]}', '${song.split(' - ')[1]}')" style="padding: 8px 0;">
                      <div class="recent-image">🎵</div>
                      <div class="song-info">
                        <p class="song-title">${song.split(' - ')[0]}</p>
                        <p class="song-artist">${song.split(' - ')[1]}</p>
                      </div>
                      <button class="play-btn" onclick="playSong('${song.split(' - ')[0]}', '${song.split(' - ')[1]}'); event.stopPropagation();" style="width: 24px; height: 24px; font-size: 10px;">▶️</button>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          } else {
            resultsDiv.innerHTML = '<p style="color: #b3b3b3;">No face detected. Please try again with better lighting.</p>';
          }

          btn.disabled = false;
          btn.innerHTML = originalText;
        };
      } catch (err) {
        resultsDiv.innerHTML = '<p style="color: #b3b3b3;">Camera access denied or not available.</p>';
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    function playPlaylist(playlistName) {
      alert(`🎵 Now playing: ${playlistName}\n\nThis would start playing the playlist in a real Spotify integration!`);
    }

    function playSong(songTitle, artist) {
      alert(`🎵 Now playing: "${songTitle}" by ${artist}\n\nThis would start playing the song in a real Spotify integration!`);
    }
});
