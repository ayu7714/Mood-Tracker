<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  {% include 'header.html' %}
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Join MoodAI and start tracking your emotions</p>
      </div>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      <form method="post" class="auth-form" id="registerForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Choose a password" required>
        </div>
        <div id="regError" class="form-error" style="display:none"></div>
        <button type="submit" class="auth-btn">Create Account</button>
      </form>

      <script>
        (function(){
          const form = document.getElementById('registerForm');
          const errEl = document.getElementById('regError');
          function showError(msg){ errEl.textContent = msg; errEl.style.display = 'block'; }
          function hideError(){ errEl.style.display = 'none'; errEl.textContent = ''; }
          function validEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

          form.addEventListener('submit', function(e){
            hideError();
            const username = form.username.value.trim();
            const email = form.email.value.trim();
            const pwd = form.password.value || '';

            if(username.length < 3){ e.preventDefault(); showError('Username must be at least 3 characters.'); form.username.focus(); return; }
            if(!validEmail(email)){ e.preventDefault(); showError('Please enter a valid email address.'); form.email.focus(); return; }
            if(pwd.length < 6){ e.preventDefault(); showError('Password must be at least 6 characters.'); form.password.focus(); return; }
            // allow submit
          });
        })();
      </script>
      <div class="auth-footer">
        <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
        <p><a href="{{ url_for('index') }}">Back to Home</a></p>
      </div>
    </div>
  </div>
</body>
</html>
