<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breathing Exercise</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .content {
      background: white;
      border-radius: 16px;
      padding: 30px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    
    h1 {
      font-size: 24px;
      color: #333;
      margin: 0;
      text-align: center;
    }
    
    .subtitle {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin: 0;
    }
    
    .circle-container {
      width: 100%;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
    }
    
    .breath-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      flex-shrink: 0;
    }
    
    .breath-text {
      font-size: 14px;
      font-weight: 700;
      color: white;
      text-align: center;
      line-height: 1.3;
      padding: 10px;
    }
    
    .instruction {
      font-size: 14px;
      color: #666;
      text-align: center;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      width: 100%;
      justify-content: center;
    }
    
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 120ms ease;
      min-width: 100px;
    }
    
    .btn-start {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
    }
    
    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
    }
    
    .btn-start:active {
      transform: translateY(0);
    }
    
    .btn-stop {
      background: #ff6b6b;
      color: white;
      display: none;
    }
    
    .btn-stop:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 107, 107, 0.4);
    }
    
    .btn-stop:active {
      transform: translateY(0);
    }
    
    .cycles {
      font-size: 12px;
      color: #999;
      text-align: center;
      height: 20px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <h1>🌬️ Breathing</h1>
      <p class="subtitle">Calm your mind with guided breathing</p>
      
      <div class="circle-container">
        <div class="breath-circle">
          <div class="breath-text" id="circleText">Ready?</div>
        </div>
      </div>
      
      <div class="instruction" id="instruction">Click Start to begin</div>
      
      <div class="button-group">
        <button class="btn-start" id="startBtn">Start</button>
        <button class="btn-stop" id="stopBtn">Stop</button>
      </div>
      
      <div class="cycles" id="cycles"></div>
    </div>
  </div>

  <script>
    const circle = document.querySelector('.breath-circle');
    const circleText = document.getElementById('circleText');
    const instruction = document.getElementById('instruction');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const cyclesEl = document.getElementById('cycles');
    
    let isBreathing = false;
    let cycleCount = 0;
    let phaseIndex = 0;
    let timeoutId = null;
    
    const phases = [
      { text: 'Breathe In', scale: 1.3, duration: 4000 },
      { text: 'Hold', scale: 1.3, duration: 4000 },
      { text: 'Breathe Out', scale: 1, duration: 4000 },
      { text: 'Hold', scale: 1, duration: 2000 }
    ];
    
    function runPhase() {
      if (!isBreathing) return;
      
      const phase = phases[phaseIndex];
      
      // Update instruction text
      instruction.textContent = phase.text;
      
      // Animate circle
      circle.style.transition = `transform ${phase.duration}ms ease-in-out`;
      circle.style.transform = `scale(${phase.scale})`;
      
      // Move to next phase
      phaseIndex = (phaseIndex + 1) % phases.length;
      
      // Update cycles count
      if (phaseIndex === 0) {
        cycleCount++;
        cyclesEl.textContent = `Cycle: ${cycleCount}`;
      }
      
      // Schedule next phase
      timeoutId = setTimeout(runPhase, phase.duration);
    }
    
    startBtn.addEventListener('click', function() {
      if (isBreathing) return;
      
      isBreathing = true;
      cycleCount = 0;
      phaseIndex = 0;
      
      startBtn.style.display = 'none';
      stopBtn.style.display = 'block';
      cyclesEl.textContent = '';
      circleText.textContent = 'Breathing...';
      
      // Start the breathing cycle
      runPhase();
    });
    
    stopBtn.addEventListener('click', function() {
      isBreathing = false;
      
      if (timeoutId) {
        clearTimeout(timeoutId);
      }
      
      // Reset circle
      circle.style.transition = 'transform 500ms ease-in-out';
      circle.style.transform = 'scale(1)';
      circleText.textContent = 'Well done! 🌿';
      instruction.textContent = `You completed ${cycleCount} cycle${cycleCount !== 1 ? 's' : ''}. Great job!`;
      
      startBtn.style.display = 'block';
      stopBtn.style.display = 'none';
      cyclesEl.textContent = '💪 Feel better?';
    });
  </script>
</body>
</html>
